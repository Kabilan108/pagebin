name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - bun.lock
      - src/**
      - worker/**
      - tests/**
      - tsconfig*.json
      - flake.nix
      - flake.lock
      - wrangler.toml
      - .github/workflows/release.yml

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build Linux x64 binary
        run: |
          bun run build:linux
          chmod +x dist/pagebin-linux-x64
          sha256sum dist/pagebin-linux-x64 > dist/pagebin-linux-x64.sha256

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: pagebin-linux-x64
          path: |
            dist/pagebin-linux-x64
            dist/pagebin-linux-x64.sha256
          if-no-files-found: error
          retention-days: 7

  nix-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Check flake
        run: nix flake check --no-build

      - name: Build flake package
        run: nix build .#pagebin

  detect-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Detect unpublished package version
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          new_version="$(node -p "require('./package.json').version")"
          release_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GH_REPO}/releases/tags/v${new_version}")"

          case "$release_status" in
            200) echo "should_release=false" >> "$GITHUB_OUTPUT" ;;
            404) echo "should_release=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unexpected GitHub release API status: $release_status" >&2; exit 1 ;;
          esac

          echo "version=$new_version" >> "$GITHUB_OUTPUT"

  release:
    needs:
      - validate
      - nix-validate
      - detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: pagebin-linux-x64
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.detect-version.outputs.version }}
        run: |
          set -euo pipefail

          tag="v${VERSION}"
          release_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GH_REPO}/releases/tags/${tag}")"

          case "$release_status" in
            200) echo "Release $tag already exists; leaving it unchanged."; exit 0 ;;
            404) ;;
            *) echo "Unexpected GitHub release API status: $release_status" >&2; exit 1 ;;
          esac

          gh release create "$tag" dist/pagebin-linux-x64 dist/pagebin-linux-x64.sha256 \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes "Linux x86_64 single-file pagebin binary."

name = "pagebin"
main = "worker/index.ts"
compatibility_date = "2024-11-01"
workers_dev = true
preview_urls = false

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "pagebin-artifacts"

[vars]
PAGEBIN_MAX_BYTES = "10485760"

[triggers]
crons = ["0 0 * * 0"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
